	<script>
	// Dibuja la brújula en el canvas según el ángulo recibido
	function dibujarBrujula(azimuth) {
		const canvas = document.getElementById('canvas-brujula');
		if (!canvas) return;
		const ctx = canvas.getContext('2d');
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		// Círculo exterior
		ctx.save();
		ctx.beginPath();
		ctx.arc(35, 35, 32, 0, 2 * Math.PI);
		ctx.strokeStyle = '#2196f3';
		ctx.lineWidth = 3;
		ctx.stroke();
		ctx.restore();
		// Aguja
		ctx.save();
		ctx.translate(35, 35);
		ctx.rotate((azimuth - 90) * Math.PI / 180);
		ctx.beginPath();
		ctx.moveTo(0, 0);
		ctx.lineTo(28, 0);
		ctx.strokeStyle = '#e53935';
		ctx.lineWidth = 4;
		ctx.stroke();
		ctx.restore();
		// Norte
		ctx.save();
		ctx.font = 'bold 13px Arial';
		ctx.fillStyle = '#fff';
		ctx.textAlign = 'center';
		ctx.fillText('N', 35, 15);
		ctx.restore();
		// Valor numérico
		ctx.save();
		ctx.font = '11px Arial';
		ctx.fillStyle = '#6ec1e4';
		ctx.textAlign = 'center';
		ctx.fillText(Math.round(azimuth) + '°', 35, 65);
		ctx.restore();
	}

	// La brújula se actualiza desde el WebSocket principal (ver handler 'brujula' en conectarWS)
	// Dibujar brújula inicial (posición por defecto)
	window.addEventListener('DOMContentLoaded', function() {
		setTimeout(function() { dibujarBrujula(0); }, 200);
	});

			const btnPantallaCompleta = document.getElementById('btn-pantalla-completa');

			const btnTuercaIzq = document.getElementById('btn-tuerca-izq');
			const menuOpcionesIzq = document.getElementById('menu-opciones-izq');
			btnTuercaIzq.onclick = function(e) {
				e.stopPropagation();
				menuOpcionesIzq.style.display = menuOpcionesIzq.style.display === 'none' ? 'block' : 'none';
			};
			document.addEventListener('click', function(e) {
				if (menuOpcionesIzq && menuOpcionesIzq.style.display === 'block') menuOpcionesIzq.style.display = 'none';
			});

			// Botón pantalla completa
			btnPantallaCompleta.onclick = function(e) {
				e.stopPropagation();
				document.documentElement.requestFullscreen().catch(err => console.log('Error fullscreen:', err));
			};

			// Verificar si debe iniciar con pantalla completa
			async function verificarPantallaCompleta() {
				try {
					const res = await fetch('/api/config');
					if (res.ok) {
						const cfg = await res.json();
						if (cfg.pantalla_completa) {
							// Esperar un momento para asegurar que el DOM esté listo
							setTimeout(() => {
								document.documentElement.requestFullscreen().catch(err => console.log('Fullscreen automático falló:', err));
							}, 500);
						}
					}
				} catch (e) {
					console.log('Error verificando pantalla completa:', e);
				}
			}

			// Llamar función al cargar página
			window.addEventListener('load', verificarPantallaCompleta);

			// Función para abrir el router
			async function abrirRouter() {
				try {
					const res = await fetch('/api/config');
					if (!res.ok) {
						alert('No se pudo obtener la configuración del router');
						return;
					}
					const config = await res.json();
					const routerIp = config.router_ip;
					if (!routerIp || routerIp.trim() === '') {
						alert('⚠️ No hay dirección IP del router configurada.\n\nPor favor, configura la IP del router en Configuración.');

					// Agregar http:// si no tiene protocolo
					let url = routerIp.trim();

						url = 'http://' + url;

	    <script>
		    // Cámara 1 y 2

			   // --- Play/Stop y Captura ---
			   let hlsPlayers = { cam1: null, cam2: null };
			   let playing = { cam1: false, cam2: false };
			   let estadoReles = {};
			   // Inicializar nombres de relés vacío (se carga desde config y WebSocket)
			   window.nombres_reles = {};

		   // Variables de estado UI
		   let velocidadActual = 50;
		   let recorridoGrabando = false;
		function iniciarCamara(videoId, playlist, camKey) {
			var video = document.getElementById(videoId);
			if (window.Hls && Hls.isSupported()) {
				var hls = new Hls({
					lowLatencyMode: true,
					maxBufferLength: 1,
					maxMaxBufferLength: 2,
					maxBufferSize: 4 * 1000 * 1000,
					maxBufferHole: 0.1,
					liveSyncDuration: 0.1
				});
				hls.loadSource(playlist);
				hls.attachMedia(video);
				hlsPlayers[camKey] = hls;
			} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
				video.src = playlist;
			}
			video.play();
			playing[camKey] = true;
		}

		function detenerCamara(videoId, camKey) {
			var video = document.getElementById(videoId);
			if (window.Hls && Hls.isSupported() && hlsPlayers[camKey]) {
				hlsPlayers[camKey].destroy();
				hlsPlayers[camKey] = null;
			}
			video.pause();
			video.removeAttribute('src');
			video.load();
			playing[camKey] = false;
		}

		function toggleCamara(videoId, playlist, camKey, btnId) {
			const iconSpan = document.getElementById('icon' + btnId.charAt(0).toUpperCase() + btnId.slice(1));
			const floatIconId = 'iconPlay' + camKey.charAt(0).toUpperCase() + camKey.slice(1) + 'Float';
			const floatIcon = document.getElementById(floatIconId);
			const indice = camKey === 'cam1' ? 1 : 2;
			
			if (!playing[camKey]) {
				// Enviar comando al servidor para iniciar HLS si no está corriendo
				if (window.ws && window.ws.readyState === 1) {
					window.ws.send(JSON.stringify({ tipo: 'camara', indice: indice, accion: 'iniciar' }));
				}
				// Dar tiempo al servidor para iniciar el stream, luego cargar playlist
				setTimeout(() => {
					iniciarCamara(videoId, playlist, camKey);
				}, 800);
				// Cambia a icono de Stop
				const stopSvg = '<svg width="100%" height="100%" viewBox="0 0 22 22" fill="#e53935" style="display:block;"><rect x="6" y="6" width="10" height="10" rx="2"/></svg>';
				iconSpan.innerHTML = stopSvg;
				if (floatIcon) floatIcon.outerHTML = '<svg id="' + floatIconId + '" width="22" height="22" viewBox="0 0 22 22" fill="#e53935" style="display:block;"><rect x="6" y="6" width="10" height="10" rx="2"/></svg>';
				playing[camKey] = true;
			} else {
				detenerCamara(videoId, camKey);

			// --- Captura de Foto ---
			async function capturarFoto(videoId, camara) {
				const video = document.getElementById(videoId);
				if (video.readyState < 2) {
					alert('La cámara no está lista para capturar.');
					return;
				}
				const canvas = document.createElement('canvas');
				canvas.width = video.videoWidth;
				canvas.height = video.videoHeight;
				const ctx = canvas.getContext('2d');
				ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
				
				// Convertir canvas a blob
				canvas.toBlob(function(blob) {
					// Crear URL descargable de la imagen
					const url = URL.createObjectURL(blob);
					
					// Crear nombre del archivo con fecha y hora
					const ahora = new Date();
					const fecha = ahora.toISOString().replace(/[:.]/g, '-').split('T')[0];
					const hora = ahora.toTimeString().split(' ')[0].replace(/:/g, '');
					const nombreArchivo = `foto_cam${camara === 'cam1' ? '1' : '2'}_${fecha}_${hora}.jpg`;
					
					// Crear elemento <a> para descargar
					const a = document.createElement('a');
					a.href = url;
					a.download = nombreArchivo;
					
					// Agregar al DOM, hacer clic y remover
					document.body.appendChild(a);
					a.click();
					document.body.removeChild(a);
					
					// Liberar la URL del objeto
					URL.revokeObjectURL(url);
					
					alert(`✓ Foto descargada: ${nombreArchivo}`);
				}, 'image/jpeg', 0.92);
			}

			async function grabarVideo(videoId, camara) {
				const video = document.getElementById(videoId);
				const btnGrabar = document.getElementById(`grabar-cam${camara === 'cam1' ? '1' : '2'}`);
				const btnGrabarFloat = document.getElementById(`btnRecordCam${camara === 'cam1' ? '1' : '2'}Float`);
				const iconSpan = document.getElementById(`iconGrabarCam${camara === 'cam1' ? '1' : '2'}`);
				const indicador = document.getElementById('grabando-indicador');
				const textoCamara = document.getElementById('grabando-camara');
				
				let stream = video.captureStream ? video.captureStream() : null;
				if (!stream) {
					alert('No se puede obtener el stream de video.');
					return;
				}
				if (grabando[camara]) {
					// Detener grabación
					mediaRecorders[camara].stop();
					btnGrabar.classList.remove('grabando');
					if (btnGrabarFloat) btnGrabarFloat.classList.remove('grabando');
					indicador.classList.remove('activo');
					return;
				}
				recordedChunks[camara] = [];
				let options = { mimeType: 'video/webm;codecs=vp9' };
				let mediaRecorder = new MediaRecorder(stream, options);
				mediaRecorders[camara] = mediaRecorder;
				grabando[camara] = true;
				
				// Mostrar indicador de grabación
				btnGrabar.classList.add('grabando');
				if (btnGrabarFloat) btnGrabarFloat.classList.add('grabando');
				textoCamara.textContent = `Grabando Cámara ${camara === 'cam1' ? '1' : '2'}`;
				indicador.classList.add('activo');
				
				mediaRecorder.ondataavailable = function(e) {
					if (e.data.size > 0) recordedChunks[camara].push(e.data);
				};
				mediaRecorder.onstop = function() {
					grabando[camara] = false;
					const blob = new Blob(recordedChunks[camara], { type: 'video/webm' });
					
					// Crear URL descargable del video
					const url = URL.createObjectURL(blob);
					
					// Crear nombre del archivo con fecha y hora
					const ahora = new Date();
					const fecha = ahora.toISOString().replace(/[:.]/g, '-').split('T')[0];
					const hora = ahora.toTimeString().split(' ')[0].replace(/:/g, '');
					const nombreArchivo = `video_cam${camara === 'cam1' ? '1' : '2'}_${fecha}_${hora}.webm`;
					
					// Crear elemento <a> para descargar
					const a = document.createElement('a');
					a.href = url;
					a.download = nombreArchivo;
					
					// Agregar al DOM, hacer clic y remover
					document.body.appendChild(a);
					a.click();
					document.body.removeChild(a);
					
					// Liberar la URL del objeto
					URL.revokeObjectURL(url);
					
					alert(`✓ Video descargado: ${nombreArchivo}`);
				};
				mediaRecorder.start();
			}

			function construirWSUrl() {
				if (window.WS_URL && typeof window.WS_URL === 'string') {
					return window.WS_URL;
				}
				const wsProto = (location.protocol === 'https:') ? 'wss://' : 'ws://';
				return wsProto + location.host + '/ws';
			}

			function enviarMensajeWS(payload) {
				const mensaje = (typeof payload === 'string') ? payload : JSON.stringify(payload);
				if (window.ws && window.ws.readyState === 1) {
					window.ws.send(mensaje);
					return true;
				}
				colaMensajesWS.push(mensaje);
				if (!window.ws || (window.ws.readyState !== 0 && window.ws.readyState !== 1)) {
					conectarWS();
				}
				return false;
			}

			function vaciarColaWS() {
				if (!(window.ws && window.ws.readyState === 1)) return;
				while (colaMensajesWS.length > 0) {
					const msg = colaMensajesWS.shift();
					window.ws.send(msg);
				}
			}

			function beep(frec, dur, vol=0.2) {
				try {
					const ctx = new (window.AudioContext || window.webkitAudioContext)();
					const o = ctx.createOscillator();
					const g = ctx.createGain();
					o.type = 'sine';
					o.frequency.value = frec;
					g.gain.value = vol;
					o.connect(g); g.connect(ctx.destination);
					o.start();
					setTimeout(()=>{o.stop();ctx.close();}, dur);
				} catch(e) {}
			}
			function setConexion(estado, textoPersonalizado, reconectando) {
				const enReconexion = !!reconectando;
				const _ = textoPersonalizado; // Mantener firma de función sin usar elementos eliminados
				if (ultimoEstadoConexion !== estado && estado) {
					beep(880, 120, 0.18);
				} else if (ultimoEstadoConexion !== estado && !estado && !enReconexion) {
					beep(220, 220, 0.18);
				}
				ultimoEstadoConexion = estado;
			}

			function conectarWS() {
				if (window.ws && (window.ws.readyState === 0 || window.ws.readyState === 1)) {
					return;

				console.log('📡 Intentando conectar WebSocket...');
				if (intentosReconexion > 0) {

					setConexion(false, 'Conectando WS...', true);

				window.ws = new WebSocket(wsUrl);
				window.ws.onopen = function() {
					console.log('✅ WebSocket ABIERTO - readyState:', window.ws.readyState);
					intentosReconexion = 0;
					if (reconexionProgramada) {
						clearTimeout(reconexionProgramada);
						reconexionProgramada = null;
					}
					detenerPollingIndicadores();
					setConexion(true);
					conectado = true;
					vaciarColaWS();
					// Solicitar datos completos al conectar para asegurar estados iniciales de relés
					enviarMensajeWS({ tipo: 'obtener_datos' });
					console.log('📤 Enviado: obtener_datos');

						if (window.ws && window.ws.readyState === 1) {

						}
					}, 5000);
					// Asegurar que el mapa se inicialice si no lo está
					setTimeout(function() {
						if (window._leafletMap && window._leafletMap.invalidateSize) {
							window._leafletMap.invalidateSize();
							console.log('Mapa redimensionado');
						}
					}, 500);
				};
				window.ws.onclose = function() {
					console.log('❌ WebSocket CERRADO');
					intentosReconexion++;
					setConexion(false, 'Reconectando WS... intento ' + intentosReconexion, true);
					conectado = false;
					iniciarPollingIndicadores();
					if (!reconexionProgramada) {
						reconexionProgramada = setTimeout(function() {
							reconexionProgramada = null;
							conectarWS();
						}, 2000);
					}
				};
				window.ws.onerror = function(error) {

						console.warn('⚠️ No se pudieron cargar nombres de relés:', e);
					}
					// Cargar estado real de relés desde API (funciona incluso si WS está caído)
					try {
						const resReles = await fetch('/api/reles');
						if (resReles.ok) {
							const dataReles = await resReles.json();
							if (dataReles && dataReles.reles) {
								estadoReles = { ...dataReles.reles };
							}
							if (dataReles && dataReles.nombres_reles) {
								window.nombres_reles = { ...window.nombres_reles, ...dataReles.nombres_reles };
							}
						}
					} catch (e) {
						console.warn('⚠️ No se pudo cargar estado real de relés por API:', e);
					}

					const contenedor = document.getElementById('reles-botones');
					if (contenedor && contenedor.children.length === 0) {
						if (Object.keys(estadoReles).length === 0) {
							for (let i = 1; i <= 9; i++) estadoReles[String(i)] = false;
						}
						try { renderReles(estadoReles); } catch(e) { console.warn('Error renderizando relés iniciales:', e); }
						console.log('✓ Relés renderizados al cargar página');
					}
				};
				if (typeof window.cargarNombresRelesDesdeConfig === 'function') {
					window.cargarNombresRelesDesdeConfig();
				}
				cargarTemperaturaRaspberry();
				iniciarPollingIndicadores();

				const btnMenuMapa = document.getElementById('btn-menu-mapa');
				const menuMapaOpciones = document.getElementById('menu-mapa-opciones');
				if (btnMenuMapa && menuMapaOpciones) {
					btnMenuMapa.addEventListener('click', (e) => {
						e.stopPropagation();
						menuMapaOpciones.style.display = menuMapaOpciones.style.display === 'none' ? 'block' : 'none';
					});
					document.addEventListener('click', () => {
						if (menuMapaOpciones.style.display === 'block') menuMapaOpciones.style.display = 'none';
					});
				}

				const btnMapaGuardar = document.getElementById('mapa-guardar-ubicacion');

					btnMapaGuardar.addEventListener('click', () => {
						const btn = document.getElementById('gps-guardar');
						if (btn) btn.click();
					});
				}

				const btnMapaRecorrido = document.getElementById('mapa-grabar-recorrido');
				if (btnMapaRecorrido) {
					let grabandoRecorrido = false;
					btnMapaRecorrido.onclick = function() {
						if (!(window.ws && window.ws.readyState === 1)) {
							alert('Error: WebSocket no conectado');
							return;
						}
						grabandoRecorrido = !grabandoRecorrido;
						if (grabandoRecorrido) {
							const nombre = prompt('Nombre del recorrido (opcional):');
							if (nombre === null) { grabandoRecorrido = false; return; }
							const nombreFinal = nombre.trim() || 'Recorrido ' + new Date().toLocaleString('es-ES', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
							this.textContent = '⏹️ Detener recorrido';
							this.style.background = '#d32f2f';
							this.style.color = '#fff';
							window.ws.send(JSON.stringify({ tipo: 'iniciar_recorrido', nombre: nombreFinal }));
							console.log('Recorrido GPS iniciado:', nombreFinal);
						} else {
							this.textContent = '🛤️ Grabar recorrido';
							this.style.background = '';
							this.style.color = '';
							window.ws.send(JSON.stringify({ tipo: 'finalizar_recorrido' }));
							console.log('Recorrido GPS finalizado');
						}
						menuMapaOpciones.style.display = 'none';
					};
				}

				// Conectar eventos de botones de velocidad
				const mapeoVelocidad = [
					{ id: 'vel-lenta', valor: 40 },
					{ id: 'vel-media', valor: 60 },
					{ id: 'vel-rapida', valor: 80 },
					{ id: 'vel-maxima', valor: 99 }
				];
				mapeoVelocidad.forEach(cfg => {
					const btn = document.getElementById(cfg.id);
					if (!btn) return;
					btn.addEventListener('click', () => {
						console.log('Click en velocidad:', cfg.valor);
						if (!(window.ws && window.ws.readyState === 1)) {
							console.error('WebSocket no conectado');
							alert('Error: WebSocket no conectado');
							return;
						}
						console.log('Enviando velocidad:', cfg.valor);
						aplicarVelocidadUI(cfg.valor);
						window.ws.send(JSON.stringify({ 
							tipo: 'velocidad', 
							nivel: cfg.valor 
						}));
					});
				});

				// Eventos GPS
				const btnGuardarGPS = document.getElementById('gps-guardar');
				if (btnGuardarGPS) {
					btnGuardarGPS.addEventListener('click', async () => {
						// Obtener la última posición GPS mostrada en la UI
						const latStr = document.getElementById('gps-lat')?.textContent;
						const lonStr = document.getElementById('gps-lon')?.textContent;
						const lat = parseFloat(latStr);
						const lon = parseFloat(lonStr);
						if (!isFinite(lat) || !isFinite(lon)) {
							alert('No hay posición GPS válida para guardar.');
							return;
						}
						let nombre = prompt('Nombre de la ubicación (opcional):');
						if (nombre === null) return; // Cancelado
						nombre = nombre.trim() || `Ubicación ${new Date().toLocaleString('es-ES', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}`;
						let descripcion = '';
						try {
							const res = await fetch('/api/ubicaciones', {
								method: 'POST',
								headers: { 'Content-Type': 'application/json' },
								body: JSON.stringify({
									nombre,
									descripcion,
									latitud: lat,
									longitud: lon
								})
							});
							const data = await res.json();
							if (res.ok && data.exito) {
								alert('✔ Ubicación guardada');
							} else {
								alert('✖ Error al guardar ubicación: ' + (data.error || data.mensaje || '')); 
							}
						} catch (e) {
							alert('✖ Error al guardar ubicación: ' + e.message);
						}
					});
				}

				const btnIrDestino = document.getElementById('gps-destino');
				if (btnIrDestino) {
					btnIrDestino.addEventListener('click', () => {
						if (!(window.ws && window.ws.readyState === 1)) {
							alert('Error: WebSocket no conectado');
							return;
						}
						const entrada = prompt('Ingrese destino como "latitud,longitud" (ej: 4.7110,-74.0721)');
						if (!entrada) return;
						const partes = entrada.split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
						if (partes.length < 2) {
							alert('Formato inválido. Use: latitud,longitud');
							return;
						}
						const lat = parseFloat(partes[0]);
						const lon = parseFloat(partes[1]);
						if (!isFinite(lat) || !isFinite(lon)) {
							alert('Coordenadas inválidas');
							return;
						}
						const nombre = (document.getElementById('gps-nombre')?.value || '').trim();
						console.log('Enviando destino:', lat, lon, nombre ? ('nombre=' + nombre) : '');
						window.ws.send(JSON.stringify({ tipo: 'gps_destino', latitud: lat, longitud: lon, nombre: nombre || undefined }));
					});
				}
				conectarWS();
			});

	// === SAFETY FALLBACK: Ensure relay buttons render even if other mechanisms failed ===
	(function() {
		var intentos = 0;
		var intervalo = setInterval(function() {
			intentos++;
			var contenedor = document.getElementById('reles-botones');
			if (contenedor && contenedor.children.length === 0 && typeof renderReles === 'function') {
				console.log('⚙️ Fallback: Renderizando relés (intento ' + intentos + ')');
				try {
					// Initialize default relay states if empty
					if (typeof estadoReles !== 'undefined' && Object.keys(estadoReles).length === 0) {
						for (var i = 1; i <= 9; i++) estadoReles[String(i)] = false;
					}
					renderReles(typeof estadoReles !== 'undefined' ? estadoReles : {});
				} catch(e) {
					console.error('Error en fallback renderReles:', e);
				}
			}
			// Stop trying after 15 seconds or if buttons exist
			if (intentos >= 15 || (contenedor && contenedor.children.length > 0)) {
				clearInterval(intervalo);
			}
		}, 1000);
	})();
