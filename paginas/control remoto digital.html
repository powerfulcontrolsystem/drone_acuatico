	<script>
// Overlay de carga eliminado
	// Dibuja la brújula en el canvas según el ángulo recibido
	function dibujarBrujula(azimuth) {
		const canvas = document.getElementById('canvas-brujula');
		if (!canvas) return;
		const ctx = canvas.getContext('2d');
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		// Círculo exterior
		ctx.save();
		ctx.beginPath();
		ctx.arc(35, 35, 32, 0, 2 * Math.PI);
		ctx.strokeStyle = '#2196f3';
		ctx.lineWidth = 3;
		ctx.stroke();
		ctx.restore();
		// Aguja
		ctx.save();
		ctx.translate(35, 35);
		ctx.rotate((azimuth - 90) * Math.PI / 180);
		ctx.beginPath();
		ctx.moveTo(0, 0);
		ctx.lineTo(28, 0);
		ctx.strokeStyle = '#e53935';
		ctx.lineWidth = 4;
		ctx.stroke();
		ctx.restore();
		// Norte
		ctx.save();
		ctx.font = 'bold 13px Arial';
		ctx.fillStyle = '#fff';
		ctx.textAlign = 'center';
		ctx.fillText('N', 35, 15);
		ctx.restore();
		// Valor numérico
		ctx.save();
		ctx.font = '11px Arial';
		ctx.fillStyle = '#6ec1e4';
		ctx.textAlign = 'center';
		ctx.fillText(Math.round(azimuth) + '°', 35, 65);
		ctx.restore();
	}

	// La brújula se actualiza desde el WebSocket principal (ver handler 'brujula' en conectarWS)
	// Dibujar brújula inicial (posición por defecto)
	window.addEventListener('DOMContentLoaded', function() {
		setTimeout(function() { dibujarBrujula(0); }, 200);
	});
	</script>

		<script>
			const btnPantallaCompleta = document.getElementById('btn-pantalla-completa');
			// Menú tuerca izquierdo
			const btnTuercaIzq = document.getElementById('btn-tuerca-izq');
			const menuOpcionesIzq = document.getElementById('menu-opciones-izq');
			btnTuercaIzq.onclick = function(e) {
				e.stopPropagation();
				menuOpcionesIzq.style.display = menuOpcionesIzq.style.display === 'none' ? 'block' : 'none';
			};
			document.addEventListener('click', function(e) {
				if (menuOpcionesIzq && menuOpcionesIzq.style.display === 'block') menuOpcionesIzq.style.display = 'none';
			});

			// Botón pantalla completa
			btnPantallaCompleta.onclick = function(e) {
				e.stopPropagation();
				document.documentElement.requestFullscreen().catch(err => console.log('Error fullscreen:', err));
			};

			// Verificar si debe iniciar con pantalla completa
			async function verificarPantallaCompleta() {
				try {
					const res = await fetch('/api/config');
					if (res.ok) {
						const cfg = await res.json();
						if (cfg.pantalla_completa) {
							// Esperar un momento para asegurar que el DOM esté listo
							setTimeout(() => {
								document.documentElement.requestFullscreen().catch(err => console.log('Fullscreen automático falló:', err));
							}, 500);
						}
					}
				} catch (e) {
					console.log('Error verificando pantalla completa:', e);
				}
			}

			// Llamar función al cargar página
			window.addEventListener('load', verificarPantallaCompleta);

			// Función para abrir el router
			async function abrirRouter() {
				try {
					const res = await fetch('/api/config');
					if (!res.ok) {
						alert('No se pudo obtener la configuración del router');
						return;
					}
					const config = await res.json();
					const routerIp = config.router_ip;
					if (!routerIp || routerIp.trim() === '') {
						alert('⚠️ No hay dirección IP del router configurada.\n\nPor favor, configura la IP del router en Configuración.');
						return;
					}
					// Agregar http:// si no tiene protocolo
					let url = routerIp.trim();
					if (!url.startsWith('http://') && !url.startsWith('https://')) {
						url = 'http://' + url;
					}
					window.open(url, '_blank');
				} catch (e) {
					alert('Error al intentar abrir el router: ' + e.message);
				}

			// Inicializar mapa con la posición GPS actual o la última posición guardada
			async function inicializarMapaInicial() {
				try {
					const res = await fetch('/api/gps/actual');
					if (res.ok) {
						const data = await res.json();
						if (data.exito && data.datos && data.datos.latitud && data.datos.longitud) {
							mostrarMapaGPS(Number(data.datos.latitud), Number(data.datos.longitud), true);
							return;
						}
					}
				} catch(e) {
					console.log('No se pudo obtener GPS actual:', e);
				}
				// Si no hay GPS en vivo, intentar cargar última ubicación guardada
				try {
					const res = await fetch('/api/ubicaciones');
					if (res.ok) {
						const data = await res.json();
						if (data.exito && data.ubicaciones && data.ubicaciones.length > 0) {
							const ultima = data.ubicaciones[data.ubicaciones.length - 1];
							mostrarMapaGPS(Number(ultima.latitud), Number(ultima.longitud), false);
							return;
						}
					}
				} catch(e) {}
				// Posición por defecto
				mostrarMapaGPS(0, 0, false);
			}
			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', function() { setTimeout(inicializarMapaInicial, 500); });

							<script>
							// Control de la cruz: mantener botón presionado y stop desactiva todos
							document.addEventListener('DOMContentLoaded', function() {
								const botones = {
									arriba: document.getElementById('btn-arriba'),
									abajo: document.getElementById('btn-abajo'),
									izquierda: document.getElementById('btn-izquierda'),
									derecha: document.getElementById('btn-derecha'),
									centro: document.getElementById('btn-centro')
								};
								const direcciones = {
									arriba: 'adelante',
									abajo: 'atras',
									izquierda: 'izquierda',
									derecha: 'derecha'
								};
								function activarBoton(nombre) {
									Object.keys(botones).forEach(k => {
										if (k === nombre) {
											botones[k].classList.add('activo');
											botones[k].classList.remove('inactivo');
										} else if (k !== 'centro') {
											botones[k].classList.remove('activo');
											botones[k].classList.add('inactivo');
										}
									});
								}
								function desactivarTodos() {
									Object.keys(botones).forEach(k => {
										if (k !== 'centro') {
											botones[k].classList.remove('activo');
											botones[k].classList.add('inactivo');
										}
									});
								}
								// Botones de dirección
								Object.keys(direcciones).forEach(nombre => {
									const btn = botones[nombre];
									if (!btn) return;
									btn.addEventListener('click', function() {
										activarBoton(nombre);
										if (window.ws && window.ws.readyState === 1) {
											window.ws.send(JSON.stringify({ tipo: 'motor', direccion: direcciones[nombre] }));
										}
									});
								});
								// Botón stop (centro)
								if (botones.centro) {
									botones.centro.addEventListener('click', function() {
										desactivarTodos();
										if (window.ws && window.ws.readyState === 1) {
											window.ws.send(JSON.stringify({ tipo: 'motor', direccion: 'parar' }));
										}
									});
								}
								// Inicialmente desactivados
								desactivarTodos();
							});

		// Variables para calcular velocidad en tiempo real basada en GPS
		let ultimaPosicionGPS = { lat: null, lon: null, tiempo: null };
		// Persistir último valor válido de batería y estado de carga para no mostrar 0/-- al quedar en espera
		let ultimoBatPct = null;

		// Función para calcular distancia entre dos puntos GPS (Haversine formula)
		function calcularDistanciaGPS(lat1, lon1, lat2, lon2) {
			const R = 6371; // Radio de la Tierra en km
			const dLat = (lat2 - lat1) * Math.PI / 180;
			const dLon = (lon2 - lon1) * Math.PI / 180;
			const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
				  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
				  Math.sin(dLon/2) * Math.sin(dLon/2);
			const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
			return R * c; // Distancia en km
		}

		// Función para calcular velocidad en km/h basada en cambios de GPS
		function calcularVelocidadGPS(latActual, lonActual) {
			const ahora = Date.now();
			if (ultimaPosicionGPS.lat === null || ultimaPosicionGPS.lon === null || ultimaPosicionGPS.tiempo === null) {
				ultimaPosicionGPS = { lat: latActual, lon: lonActual, tiempo: ahora };
				return 0; // Primera lectura
			}
			const distancia = calcularDistanciaGPS(ultimaPosicionGPS.lat, ultimaPosicionGPS.lon, latActual, lonActual);
			const tiempoTranscurrido = (ahora - ultimaPosicionGPS.tiempo) / 3600000; // Convertir ms a horas
			const velocidad = tiempoTranscurrido > 0 ? distancia / tiempoTranscurrido : 0;
			ultimaPosicionGPS = { lat: latActual, lon: lonActual, tiempo: ahora };
			return velocidad;
		}

		// --- Play/Stop y Captura ---
		function iniciarCamara(videoId, playlist, camKey) {
			var video = document.getElementById(videoId);
			if (window.Hls && Hls.isSupported()) {
				var hls = new Hls({
					lowLatencyMode: true,
					maxBufferLength: 1,
					maxMaxBufferLength: 2,
					maxBufferSize: 4 * 1000 * 1000,
					maxBufferHole: 0.1,
					liveSyncDuration: 0.1
				});
				hls.loadSource(playlist);
				hls.attachMedia(video);
				hlsPlayers[camKey] = hls;
			} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
				video.src = playlist;
			}
			video.play();
			playing[camKey] = true;
		}

		function detenerCamara(videoId, camKey) {
			var video = document.getElementById(videoId);
			if (window.Hls && Hls.isSupported() && hlsPlayers[camKey]) {
				hlsPlayers[camKey].destroy();
				hlsPlayers[camKey] = null;
			}
			video.pause();
			video.removeAttribute('src');
			video.load();
			playing[camKey] = false;
		}

		function toggleCamara(videoId, playlist, camKey, btnId) {
			const iconSpan = document.getElementById('icon' + btnId.charAt(0).toUpperCase() + btnId.slice(1));
			const floatIconId = 'iconPlay' + camKey.charAt(0).toUpperCase() + camKey.slice(1) + 'Float';
			const floatIcon = document.getElementById(floatIconId);
			const indice = camKey === 'cam1' ? 1 : 2;
			
			if (!playing[camKey]) {
				// Enviar comando al servidor para iniciar HLS si no está corriendo
				if (window.ws && window.ws.readyState === 1) {
					window.ws.send(JSON.stringify({ tipo: 'camara', indice: indice, accion: 'iniciar' }));
				}
				// Dar tiempo al servidor para iniciar el stream, luego cargar playlist
				setTimeout(() => {
					iniciarCamara(videoId, playlist, camKey);
				}, 800);
				// Cambia a icono de Stop
				const stopSvg = '<svg width="100%" height="100%" viewBox="0 0 22 22" fill="#e53935" style="display:block;"><rect x="6" y="6" width="10" height="10" rx="2"/></svg>';

				playing[camKey] = true;
			} else {
				detenerCamara(videoId, camKey);
				// Enviar comando al servidor para detener HLS
				if (window.ws && window.ws.readyState === 1) {
					window.ws.send(JSON.stringify({ tipo: 'camara', indice: indice, accion: 'detener' }));

				// Cambia a icono de Play
				const playSvg = '<svg width="100%" height="100%" viewBox="0 0 22 22" fill="#2196f3" style="display:block;"><polygon points="6,4 18,11 6,18"/></svg>';

		}

			// --- Captura de Foto ---
			async function capturarFoto(videoId, camara) {
				const video = document.getElementById(videoId);
				if (video.readyState < 2) {
					alert('La cámara no está lista para capturar.');
					return;
				}
				const canvas = document.createElement('canvas');
				canvas.width = video.videoWidth;
				canvas.height = video.videoHeight;
				const ctx = canvas.getContext('2d');
				ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
				
				// Convertir canvas a blob
				canvas.toBlob(function(blob) {
					// Crear URL descargable de la imagen
					const url = URL.createObjectURL(blob);
					
					// Crear nombre del archivo con fecha y hora
					const ahora = new Date();
					const fecha = ahora.toISOString().replace(/[:.]/g, '-').split('T')[0];
					const hora = ahora.toTimeString().split(' ')[0].replace(/:/g, '');
					const nombreArchivo = `foto_cam${camara === 'cam1' ? '1' : '2'}_${fecha}_${hora}.jpg`;
					
					// Crear elemento <a> para descargar
					const a = document.createElement('a');
					a.href = url;
					a.download = nombreArchivo;
					
					// Agregar al DOM, hacer clic y remover
					document.body.appendChild(a);
					a.click();
					document.body.removeChild(a);
					
					// Liberar la URL del objeto
					URL.revokeObjectURL(url);
					
					alert(`✓ Foto descargada: ${nombreArchivo}`);
				}, 'image/jpeg', 0.92);
			}

			async function grabarVideo(videoId, camara) {
				const video = document.getElementById(videoId);
				const btnGrabar = document.getElementById(`grabar-cam${camara === 'cam1' ? '1' : '2'}`);
				const btnGrabarFloat = document.getElementById(`btnRecordCam${camara === 'cam1' ? '1' : '2'}Float`);

				const indicador = document.getElementById('grabando-indicador');

				let stream = video.captureStream ? video.captureStream() : null;
				if (!stream) {
					alert('No se puede obtener el stream de video.');
					return;
				}
				if (grabando[camara]) {
					// Detener grabación
					mediaRecorders[camara].stop();
					btnGrabar.classList.remove('grabando');
					if (btnGrabarFloat) btnGrabarFloat.classList.remove('grabando');
					indicador.classList.remove('activo');
					return;
				}
				recordedChunks[camara] = [];
				let options = { mimeType: 'video/webm;codecs=vp9' };
				let mediaRecorder = new MediaRecorder(stream, options);
				mediaRecorders[camara] = mediaRecorder;
				grabando[camara] = true;
				
				// Mostrar indicador de grabación
				btnGrabar.classList.add('grabando');

				textoCamara.textContent = `Grabando Cámara ${camara === 'cam1' ? '1' : '2'}`;
				indicador.classList.add('activo');
				
				mediaRecorder.ondataavailable = function(e) {
					if (e.data.size > 0) recordedChunks[camara].push(e.data);
				};
				mediaRecorder.onstop = function() {
					grabando[camara] = false;
					const blob = new Blob(recordedChunks[camara], { type: 'video/webm' });
					
					// Crear URL descargable del video
					const url = URL.createObjectURL(blob);
					
					// Crear nombre del archivo con fecha y hora
					const ahora = new Date();
					const fecha = ahora.toISOString().replace(/[:.]/g, '-').split('T')[0];
					const hora = ahora.toTimeString().split(' ')[0].replace(/:/g, '');
					const nombreArchivo = `video_cam${camara === 'cam1' ? '1' : '2'}_${fecha}_${hora}.webm`;
					
					// Crear elemento <a> para descargar
					const a = document.createElement('a');
					a.href = url;
					a.download = nombreArchivo;
					
					// Agregar al DOM, hacer clic y remover
					document.body.appendChild(a);
					a.click();
					document.body.removeChild(a);
					
					// Liberar la URL del objeto
					URL.revokeObjectURL(url);
					
					alert(`✓ Video descargado: ${nombreArchivo}`);
				};
				mediaRecorder.start();
			}

			function construirWSUrl() {
				if (window.WS_URL && typeof window.WS_URL === 'string') {
					return window.WS_URL;

			function enviarMensajeWS(payload) {
				const mensaje = (typeof payload === 'string') ? payload : JSON.stringify(payload);
				if (window.ws && window.ws.readyState === 1) {
					window.ws.send(mensaje);
					return true;

				colaMensajesWS.push(mensaje);

			function vaciarColaWS() {
				if (!(window.ws && window.ws.readyState === 1)) return;
				while (colaMensajesWS.length > 0) {

			function beep(frec, dur, vol=0.2) {
				try {
					const ctx = new (window.AudioContext || window.webkitAudioContext)();
					const o = ctx.createOscillator();
					const g = ctx.createGain();
					o.type = 'sine';
					o.frequency.value = frec;
					g.gain.value = vol;
					o.connect(g); g.connect(ctx.destination);
					o.start();
					setTimeout(()=>{o.stop();ctx.close();}, dur);
				} catch(e) {}
			}
			function setConexion(estado, textoPersonalizado, reconectando) {

				if (texto) {

						texto.textContent = textoPersonalizado;

						texto.textContent = 'Desconectado';

					texto.style.color = color;

				if (ultimoEstadoConexion !== estado && estado) {
					beep(880, 120, 0.18);
				} else if (ultimoEstadoConexion !== estado && !estado && !enReconexion) {
					beep(220, 220, 0.18);
				}
				ultimoEstadoConexion = estado;

			if (wifiCalidad > 0) {

	function actualizarGPS(gps) {

	function actualizarBateria(bateria, solar) {
		let pct = undefined;
		let volt = undefined;
		if (bateria) {
			pct = bateria.porcentaje;
			volt = bateria.voltaje;
		}
		if ((pct === undefined || pct === null) && solar) pct = solar.porcentaje;
		if ((volt === undefined || volt === null) && solar) volt = solar.bateria_voltaje;

		const pctNum = Number(pct);
		const voltNum = Number(volt);
		if (Number.isFinite(pctNum)) ultimoBatPct = pctNum;
		if (Number.isFinite(voltNum)) ultimoBatVolt = voltNum;

		let cargando = ultimoBatCargando;
		if (bateria && typeof bateria.cargando !== 'undefined') cargando = !!bateria.cargando;

		if (typeof cargando !== 'undefined' && cargando !== null) ultimoBatCargando = cargando;

		setIndicadorTexto('bat-valor', (ultimoBatPct !== null) ? (ultimoBatPct.toFixed(0) + ' %') : '--');

	// toggleRele eliminado, todo se hace por WebSocket
			function conectarWS() {
				if (window.ws && (window.ws.readyState === 0 || window.ws.readyState === 1)) {
					return;
				}
				console.log('📡 Intentando conectar WebSocket...');
				if (intentosReconexion > 0) {
					setConexion(false, 'Reconectando WS... intento ' + intentosReconexion, true);
				} else {
					setConexion(false, 'Conectando WS...', true);
				}
				let wsUrl = construirWSUrl();
				console.log('URL WebSocket:', wsUrl);
				window.ws = new WebSocket(wsUrl);
				window.ws.onopen = function() {
					console.log('✅ WebSocket ABIERTO - readyState:', window.ws.readyState);
					intentosReconexion = 0;
					if (reconexionProgramada) {
						clearTimeout(reconexionProgramada);
						reconexionProgramada = null;
					}
					detenerPollingIndicadores();
					setConexion(true);
					conectado = true;
					vaciarColaWS();
					// Solicitar datos completos al conectar para asegurar estados iniciales de relés
					enviarMensajeWS({ tipo: 'obtener_datos' });
					console.log('📤 Enviado: obtener_datos');
					// Fallback: si datos no llegan en 5s, re-solicitar
					setTimeout(function() {
						if (window.ws && window.ws.readyState === 1) {
							var ramEl = document.getElementById('ram-valor');
							if (ramEl && ramEl.textContent === '--') {
								console.log('⚠️ Fallback: re-solicitando datos del servidor...');
								enviarMensajeWS({ tipo: 'obtener_datos' });
							}
						}
					}, 5000);
					// Asegurar que el mapa se inicialice si no lo está
					setTimeout(function() {
						if (window._leafletMap && window._leafletMap.invalidateSize) {
							window._leafletMap.invalidateSize();
							console.log('Mapa redimensionado');
						}
					}, 500);
				};
				window.ws.onclose = function() {
					console.log('❌ WebSocket CERRADO');
					intentosReconexion++;
					setConexion(false, 'Reconectando WS... intento ' + intentosReconexion, true);
					conectado = false;
					iniciarPollingIndicadores();
					if (!reconexionProgramada) {
						reconexionProgramada = setTimeout(function() {
							reconexionProgramada = null;
							conectarWS();
						}, 2000);
					}
				};
				window.ws.onerror = function(error) {
					console.error('⚠️ Error WebSocket:', error);
					setConexion(false, 'Error WS / reconectando...', true);
					iniciarPollingIndicadores();
				};
				window.ws.onmessage = function(event) {
					console.log('📥 Mensaje WebSocket recibido:', event.data);
					try {
						let data = JSON.parse(event.data);
						console.log('Tipo de mensaje:', data.tipo);
						if (data.tipo === 'conexion' || data.tipo === 'datos') {
							console.log('Recibido conexion/datos');
							if (data.nombres_reles) {
								window.nombres_reles = { ...window.nombres_reles, ...data.nombres_reles };
								console.log('✓ Nombres_reles actualizado:', window.nombres_reles);
							}
							try { actualizarIndicadores(data); } catch(ei) { console.error('Error en actualizarIndicadores:', ei); }
							if (data.reles) {
								console.log('📋 Estados de relés recibidos:', data.reles);
								try { renderReles(data.reles); } catch(er) { console.error('Error en renderReles:', er); }
							}
							// Cargar velocidad guardada de BD
							if (typeof data.velocidad !== 'undefined') {
								console.log('📤 Velocidad inicial recibida:', data.velocidad);
								aplicarVelocidadUI(Number(data.velocidad));
							}
							// Destino inicial
							if (data.destino && typeof mostrarDestino === 'function' && data.destino.latitud && data.destino.longitud) {
								try { mostrarDestino(Number(data.destino.latitud), Number(data.destino.longitud), data.destino.nombre || ''); } catch(e) { console.warn('No se pudo mostrar destino inicial:', e); }
							}
						}
						if (data.tipo === 'reles' && data.reles) {
							console.log('Tipo reles recibido:', data.reles);
							if (data.nombres_reles) {
								window.nombres_reles = { ...window.nombres_reles, ...data.nombres_reles };
							}
							renderReles(data.reles);
						}
						if (data.tipo === 'config_actualizada') {
							if (typeof window.cargarNombresRelesDesdeConfig === 'function') {
								window.cargarNombresRelesDesdeConfig();
							}
							if (typeof renderReles === 'function') {
								renderReles(estadoReles);
							}
						}
						if (data.tipo === 'respuesta_rele' && typeof data.numero !== 'undefined') {
							console.log('Respuesta de relé:', data.numero, 'estado:', data.estado, 'exito:', data.exito);
							const n = Number(data.numero);
							const on = (data.estado === 'on' || data.estado === true);
							estadoReles[n] = on;
							const btn = document.getElementById('rele' + n);
							if (btn) {
								btn.classList.toggle('activo', on);
								btn.classList.toggle('inactivo', !on);

						// Respuestas GPS
						if (data.tipo === 'respuesta_gps') {
							console.log('Respuesta GPS:', data);
							if (data.exito) {
								alert('✔ ' + (data.mensaje || 'Ubicación guardada'));
							} else {
								alert('✖ ' + (data.mensaje || 'Error al guardar ubicación'));
							}
						}
						if (data.tipo === 'destino_actual') {
							if (data.exito) {
								alert('📍 Destino establecido: ' + data.latitud + ', ' + data.longitud);
								if (typeof mostrarDestino === 'function' && data.latitud && data.longitud) {
									try { mostrarDestino(Number(data.latitud), Number(data.longitud), data.nombre || ''); } catch(e) {}
								}
							} else if (data.mensaje) {
								alert('✖ ' + data.mensaje);
							}
						}
						// Respuesta de cámara (iniciar/detener HLS)
						if (data.tipo === 'camara') {
							console.log('Respuesta cámara:', data);
							if (data.accion === 'iniciar' && !data.exito) {
								console.warn('Error al iniciar cámara ' + data.indice + ':', data.mensaje);

						// Respuesta de motor
						if (data.tipo === 'respuesta_motor') {
							console.log('Respuesta motor:', data.direccion, 'exito:', data.exito);
						}
						// Recorrido GPS
						if (data.tipo === 'recorrido_iniciado') {
							console.log('Recorrido GPS iniciado:', data.recorrido_id, data.nombre);
							recorridoGrabando = true;
							const btnRec = document.getElementById('mapa-grabar-recorrido');
							if (btnRec) btnRec.textContent = '⏹️ Finalizar recorrido';
						}
						if (data.tipo === 'recorrido_finalizado') {
							console.log('Recorrido GPS finalizado:', data.exito);
							recorridoGrabando = false;
							const btnRec = document.getElementById('mapa-grabar-recorrido');
							if (btnRec) btnRec.textContent = '🛤️ Grabar recorrido';
						}
						// Indicadores del sistema (nueva capa modular)
						if (data.tipo === 'ram' && data.datos) actualizarRAM(data.datos);
						if (data.tipo === 'temperatura' && data.datos) actualizarTemperatura(data.datos);
						if (data.tipo === 'cpu' && data.datos) actualizarCPU(data.datos);
						if (data.tipo === 'almacenamiento' && data.datos) actualizarDisco(data.datos, null);
						if (data.tipo === 'disco_uso' && data.datos) actualizarDisco(null, data.datos);
						if (data.tipo === 'bateria' && data.datos) actualizarBateria(data.datos, null);
						if (data.tipo === 'peso' && data.datos) actualizarPeso(data.datos);
						if (data.tipo === 'solar' && data.datos) {
							actualizarSolar(data.datos);
							actualizarBateria(null, data.datos);
						}
						if (data.tipo === 'gps' && data.datos) {
							const gpsPosicion = actualizarGPS(data.datos);
							actualizarVelocidad(null, gpsPosicion);
						}
						if (data.tipo === 'wifi' && data.datos) actualizarWifi(data.datos);
						// Brújula - actualizar desde el WebSocket principal
						if (data.tipo === 'brujula' && data.datos) {
							if (data.datos.valido && typeof data.datos.azimuth === 'number') {
								dibujarBrujula(data.datos.azimuth);
							}
						}
						// Velocidad broadcast (cuando otro cliente cambia la velocidad)
						if (data.tipo === 'velocidad' && typeof data.velocidad !== 'undefined') {
							aplicarVelocidadUI(Number(data.velocidad));
						}
						if (data.tipo === 'respuesta_velocidad' && typeof data.velocidad !== 'undefined') {
							aplicarVelocidadUI(Number(data.velocidad));
						}
						// Voltaje de la Raspberry Pi
						if (data.tipo === 'voltaje' && data.datos) actualizarVoltaje(data.datos);
						// Velocidad de red
						if (data.tipo === 'velocidad_red' && data.datos) {
							actualizarRed(data.datos.velocidad);
						}
					} catch(e) {
						console.error('Error al parsear mensaje WebSocket:', e, event.data);
					}
				};
			}

			function iniciarPollingIndicadores() {
				if (pollingIndicadores) return;
				const ejecutar = async () => {
					try {
						const res = await fetch('/api/indicadores');
						if (!res.ok) return;
						const data = await res.json();
						if (data && data.datos) {
							actualizarIndicadores(data.datos);
						}
					} catch (e) {
						console.warn('Error polling indicadores:', e);
					}
				};
				ejecutar();
				pollingIndicadores = setInterval(ejecutar, 5000);
			}

			function detenerPollingIndicadores() {
				if (!pollingIndicadores) return;
				clearInterval(pollingIndicadores);
				pollingIndicadores = null;
			}

						if (config.iniciar_auto_camara1 !== false && !config.desactivar_camara1) {
							setTimeout(() => {
								const btnPlay1 = document.getElementById('playCam1');
								if (btnPlay1 && !playing.cam1) {
									btnPlay1.click();
									console.log('Cámara 1 iniciada automáticamente');
								}
							}, 500);
						}
						
						// Iniciar cámara 2 si está configurada y no está desactivada
						if (config.iniciar_auto_camara2 !== false && !config.desactivar_camara2) {
							setTimeout(() => {
								const btnPlay2 = document.getElementById('playCam2');
								if (btnPlay2 && !playing.cam2) {
									btnPlay2.click();
									console.log('Cámara 2 iniciada automáticamente');
								}
							}, 700);
						}
					}
				} catch (error) {
					console.error('Error al cargar configuración para inicio automático:', error);
				}
			}
			
			// Llamar a la función después de un breve delay para asegurar que todo esté cargado
			setTimeout(iniciarCamarasAutomaticamente, 1000);
			
			// Menú flotante del mapa
			const btnMenuMapa = document.getElementById('btn-menu-mapa');
			const menuMapaOpciones = document.getElementById('menu-mapa-opciones');
			
			if (btnMenuMapa && menuMapaOpciones) {
				btnMenuMapa.onclick = function(e) {
					e.stopPropagation();
					menuMapaOpciones.style.display = menuMapaOpciones.style.display === 'none' ? 'block' : 'none';
				};
				
				document.addEventListener('click', function(e) {
					if (menuMapaOpciones.style.display === 'block' && !menuMapaOpciones.contains(e.target) && !btnMenuMapa.contains(e.target)) {
						menuMapaOpciones.style.display = 'none';
					}
				});
			}
			
			// Guardar ubicación con entrada de texto
			const btnGuardarUbicacion = document.getElementById('mapa-guardar-ubicacion');
			if (btnGuardarUbicacion) {
				btnGuardarUbicacion.onclick = function() {
					const nombre = prompt('Nombre de la ubicación (opcional):');
					if (nombre === null) return; // Usuario canceló
					
					const nombreFinal = nombre.trim() || `Ubicación ${new Date().toLocaleString('es-ES', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}`;
					document.getElementById('gps-nombre').value = nombreFinal;
					document.getElementById('gps-guardar').click();
					menuMapaOpciones.style.display = 'none';
				};
			}
			
			// Grabar recorrido
			const btnGrabarRecorrido = document.getElementById('mapa-grabar-recorrido');
			if (btnGrabarRecorrido) {
				let grabandoRecorrido = false;
				btnGrabarRecorrido.onclick = function() {
					if (!(window.ws && window.ws.readyState === 1)) {
						alert('Error: WebSocket no conectado');
						return;
					}
					grabandoRecorrido = !grabandoRecorrido;
					if (grabandoRecorrido) {
						const nombre = prompt('Nombre del recorrido (opcional):');
						if (nombre === null) { grabandoRecorrido = false; return; }
						const nombreFinal = nombre.trim() || 'Recorrido ' + new Date().toLocaleString('es-ES', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
						this.textContent = '⏹️ Detener recorrido';
						this.style.background = '#d32f2f';
						this.style.color = '#fff';
						window.ws.send(JSON.stringify({ tipo: 'iniciar_recorrido', nombre: nombreFinal }));
						console.log('Recorrido GPS iniciado:', nombreFinal);
					} else {
						this.textContent = '🛤️ Grabar recorrido';
						this.style.background = '';
						this.style.color = '';
						window.ws.send(JSON.stringify({ tipo: 'finalizar_recorrido' }));
						console.log('Recorrido GPS finalizado');
					}
					menuMapaOpciones.style.display = 'none';
				};
			}
		});
	</script>	<script>
	// === SAFETY FALLBACK: Ensure relay buttons render even if other mechanisms failed ===
	(function() {
		var intentos = 0;
		var intervalo = setInterval(function() {
			intentos++;
			var contenedor = document.getElementById('reles-botones');
			if (contenedor && contenedor.children.length === 0 && typeof renderReles === 'function') {
				console.log('⚙️ Fallback: Renderizando relés (intento ' + intentos + ')');
				try {
					// Initialize default relay states if empty
					if (typeof estadoReles !== 'undefined' && Object.keys(estadoReles).length === 0) {
						for (var i = 1; i <= 9; i++) estadoReles[String(i)] = false;
					}
					renderReles(typeof estadoReles !== 'undefined' ? estadoReles : {});
				} catch(e) {
					console.error('Error en fallback renderReles:', e);
				}
			}
			// Stop trying after 15 seconds or if buttons exist
			if (intentos >= 15 || (contenedor && contenedor.children.length > 0)) {
				clearInterval(intervalo);
			}
		}, 1000);
	})();
	</script>
